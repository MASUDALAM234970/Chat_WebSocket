<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat Room – WebSocket Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }
.dot.off { background: #ef4444; }
h2 { font-size: 1.1rem; color: #e2e8f0; }
.status { margin-left: auto; font-size: .8rem; color: #94a3b8; }
#messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: .9rem; line-height: 1.5; }
.msg.me { align-self: flex-end; background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
.msg.other { align-self: flex-start; background: #1e2235; border: 1px solid #2d3148; border-bottom-left-radius: 4px; }
.msg .meta { font-size: .72rem; opacity: .7; margin-bottom: 3px; }
.msg.system { align-self: center; background: transparent; border: 1px dashed #334155; color: #64748b; font-size: .8rem; padding: 4px 12px; border-radius: 20px; }
.typing { align-self: flex-start; color: #64748b; font-size: .8rem; padding: 4px 0; min-height: 20px; }
footer { background: #1a1d27; border-top: 1px solid #2d3148; padding: 16px 24px; display: flex; gap: 12px; }
#input { flex: 1; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: .9rem; outline: none; }
#input:focus { border-color: #4f46e5; }
button { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: .9rem; font-weight: 600; transition: background .2s; }
button:hover { background: #4338ca; }
#setup { position: fixed; inset: 0; background: #0f1117; display: flex; align-items: center; justify-content: center; z-index: 100; }
.setup-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px; padding: 40px; width: 360px; }
.setup-card h3 { margin-bottom: 20px; color: #818cf8; }
.setup-card input { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; padding: 10px; color: #e2e8f0; margin-bottom: 12px; font-size: .9rem; }
.setup-card button { width: 100%; }
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <h3>⚡ Connect to Room</h3>
    <input id="tokenInput" placeholder="JWT Access Token" />
    <input id="slugInput" placeholder="Room Slug (e.g. general-abc123)" value="{{ room_slug|default:'' }}" />
    <button onclick="connect()">Connect via WebSocket</button>
  </div>
</div>

<header>
  <div class="dot off" id="statusDot"></div>
  <h2 id="roomTitle">Connecting…</h2>
  <span class="status" id="statusText">Disconnected</span>
</header>

<div id="messages"></div>
<div class="typing" id="typingIndicator"></div>

<footer>
  <input id="input" placeholder="Type a message… (Enter to send)" onkeydown="handleKey(event)" oninput="handleTyping()" />
  <button onclick="sendMessage()">Send</button>
</footer>

<script>
let ws = null;
let typingTimer = null;
let myUserId = null;

function connect() {
  const token = document.getElementById('tokenInput').value.trim();
  const slug  = document.getElementById('slugInput').value.trim();
  if (!token || !slug) { alert('Token and slug are required.'); return; }

  // Decode user id from JWT payload
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    myUserId = payload.user_id;
  } catch(e) {}

  document.getElementById('setup').style.display = 'none';
  document.getElementById('roomTitle').textContent = slug;

  const wsUrl = `ws://${location.host}/ws/chat/${slug}/?token=${token}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus(true);
  };

  ws.onclose = (e) => {
    setStatus(false);
    addSystemMessage(`Disconnected (code ${e.code})`);
  };

  ws.onerror = () => addSystemMessage('WebSocket error.');

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleEvent(data);
  };
}

function handleEvent(data) {
  switch(data.type) {
    case 'message_history':
      data.messages.forEach(m => renderMessage(m));
      break;
    case 'chat_message':
      renderMessage(data);
      break;
    case 'typing_indicator':
      document.getElementById('typingIndicator').textContent =
        data.is_typing ? `${data.username} is typing…` : '';
      break;
    case 'user_presence':
      addSystemMessage(`${data.username} is now ${data.is_online ? 'online 🟢' : 'offline 🔴'}`);
      break;
    case 'read_receipt':
      break;
    case 'message_deleted':
      const el = document.getElementById(`msg-${data.message_id}`);
      if (el) el.querySelector('.content').textContent = '🗑 This message was deleted.';
      break;
    case 'message_edited':
      const el2 = document.getElementById(`msg-${data.message_id}`);
      if (el2) el2.querySelector('.content').textContent = data.new_content + ' (edited)';
      break;
    case 'error':
      addSystemMessage(`⚠️ ${data.message}`);
      break;
  }
}

function renderMessage(m) {
  const isMe = m.sender_id === myUserId;
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${isMe ? 'me' : 'other'}`;
  div.id = `msg-${m.message_id || m.id}`;
  div.innerHTML = `
    <div class="meta">${m.sender_username} · ${new Date(m.created_at).toLocaleTimeString()}</div>
    <div class="content">${escHtml(m.content)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat_message', message: text }));
  input.value = '';
}

function handleTyping() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'typing_start' }));
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    ws.send(JSON.stringify({ type: 'typing_stop' }));
  }, 1500);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function setStatus(online) {
  document.getElementById('statusDot').className = `dot ${online ? '' : 'off'}`;
  document.getElementById('statusText').textContent = online ? 'Connected' : 'Disconnected';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
