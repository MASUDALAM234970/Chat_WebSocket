<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealTime Chat – WebSocket Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px; padding: 40px; max-width: 500px; width: 100%; text-align: center; }
  h1 { font-size: 2rem; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  p { color: #94a3b8; margin-bottom: 32px; }
  .btn { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 8px; transition: opacity .2s; }
  .btn:hover { opacity: .85; }
  .btn.outline { background: transparent; border: 1px solid #6366f1; color: #6366f1; }
</style>
</head>
<body>
<div class="card">
  <h1>⚡ RealTime Chat</h1>
  <p>Django Channels · WebSocket · JWT Auth</p>
  <a href="/api/docs/" class="btn">📖 Swagger UI</a>
  <a href="/api/redoc/" class="btn outline">📄 ReDoc</a>
  <a href="/admin/" class="btn outline">🔧 Admin</a>
  <br><br>
  <small style="color:#475569">WebSocket endpoint: <code style="color:#818cf8">ws://host/ws/chat/&lt;room-slug&gt;/?token=JWT</code></small>
</div>
</body>
</html>
